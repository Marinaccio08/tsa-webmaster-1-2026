{% extends "template.html" %}

{% block content %}
    <div class="page-container">
        <div class="content-wrapper bg-white px-2 w-3/4">
            <h2 class="text-2xl my-4">Community Resource Directory</h2>
            <ul>
                {% for r in resources %}
                    <li class="hover:bg-gray-200 my-3 px-1 rounded-md">
                        <h3 class="rTitle text-xl">{{ r.rName }}</h3>
                        <p class="rInfo text-base">{{ r.address }} | {{ r.contact }}</p>
                        <a href={{ r.website }} class="rLink text-base">{{ r.website }}</a>
                        <p class="rDesc text-base">{{ r.desc }}</p>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
{% endblock %}
